      - name: Setup latest Gradle
        continue-on-error: true
        id: setup_latest_Gradle
        if: always() && steps.buildStep.outcome != 'skipped'
        run: |
          latestGradle="9.5.1"
          time wget -q "https://services.gradle.org/distributions/gradle-$latestGradle-bin.zip" -O "/tmp/gradle-$latestGradle-bin.zip"
          time unzip -q "/tmp/gradle-$latestGradle-bin.zip" -d /tmp/
          #
          source .github/scripts/helpers.sh
          check_folder "/tmp/gradle-$latestGradle/bin/"
          check_file   "/tmp/gradle-$latestGradle/bin/gradle"
          #
          echo "LATEST_GRADLE=$latestGradle"                          >> $GITHUB_ENV
          echo "GRADLE_BIN=/tmp/gradle-$latestGradle/bin/gradle"      >> $GITHUB_ENV
          echo "GRADLE_PROJECT=Library/Bee/Android/Prj/IL2CPP/Gradle" >> $GITHUB_ENV

      - name: Patch Gradle project for R8 Configuration Analyzer
        continue-on-error: true
        id: patch_gradle_project_for_R8
        if: always() && steps.setup_latest_Gradle.outcome == 'success'
        run: |
          # Меняем владельца на runner
          sudo chown -R runner:runner "${{ env.GRADLE_PROJECT }}"
          #
          source .github/scripts/helpers.sh
          #
          # Обновляем Gradle до latest версии
          check_folder  ${{ env.GRADLE_PROJECT }}
          check_folder "${{ env.GRADLE_PROJECT }}/gradle/"
          check_folder "${{ env.GRADLE_PROJECT }}/gradle/wrapper/"
          cat_file     "${{ env.GRADLE_PROJECT }}/gradle/wrapper/gradle-wrapper.properties"
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-${{ env.LATEST_GRADLE }}-bin.zip|' \
            "${{ env.GRADLE_PROJECT }}/gradle/wrapper/gradle-wrapper.properties"
          cat_file "${{ env.GRADLE_PROJECT }}/gradle/wrapper/gradle-wrapper.properties"
          #
          # Обновляем AGP до 9.3.0
          cat_file "${{ env.GRADLE_PROJECT }}/build.gradle"
          sed -i "s|id 'com.android.application' version '9.0.1'|id 'com.android.application' version '9.3.0'|" \
            "${{ env.GRADLE_PROJECT }}/build.gradle"
          cat_file "${{ env.GRADLE_PROJECT }}/build.gradle"
          sed -i "s|id 'com.android.library' version '9.0.1'|id 'com.android.library' version '9.3.0'|" \
            "${{ env.GRADLE_PROJECT }}/build.gradle"
          cat_file "${{ env.GRADLE_PROJECT }}/build.gradle"
          #
          echo "=== gradle-wrapper.properties ==="
          cat_file "${{ env.GRADLE_PROJECT }}/gradle/wrapper/gradle-wrapper.properties"
          echo "=== build.gradle ==="
          cat_file "${{ env.GRADLE_PROJECT }}/build.gradle"
          #
          check_folder ${{ github.workspace }}/r8analysis
          rm -rf ${{ github.workspace }}/r8analysis
          check_folder ${{ github.workspace }}/r8analysis
          mkdir -p ${{ github.workspace }}/r8analysis
          check_folder ${{ github.workspace }}/r8analysis

      - name: Fix SDK/NDK paths for R8 analyzer
        continue-on-error: true
        id: fix_sdk_ndk_paths_for_R8
        if: always() && steps.patch_gradle_project_for_R8.outcome == 'success'
        run: |
          source .github/scripts/helpers.sh
          #
          check_folder "${{ env.GRADLE_PROJECT }}/"
          #
          # Исправляем SDK path
          cat_file "${{ env.GRADLE_PROJECT }}/local.properties"
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "${{ env.GRADLE_PROJECT }}/local.properties"
          cat_file "${{ env.GRADLE_PROJECT }}/local.properties"
          #
          check_folder $ANDROID_SDK_ROOT/ndk/
          # Находим доступный NDK на раннере
          echo "=== $ANDROID_SDK_ROOT/ndk/* ==="
          ls -d     $ANDROID_SDK_ROOT/ndk/* 2>/dev/null
          echo "=== $ANDROID_SDK_ROOT/ndk/* 2>/dev/null | sort -V ==="
          ls -d     $ANDROID_SDK_ROOT/ndk/* 2>/dev/null | sort -V
          echo "====================================================="
          #NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* 2>/dev/null | sort -V | tail -1)
          # Используем конкретно 28.2.x:
          NDK_PATH="/usr/local/lib/android/sdk/ndk/28.2.13676358"
          echo "Found NDK: $NDK_PATH"
          #
          # Патчим ndkPath во ВСЕХ build.gradle
          find "${{ env.GRADLE_PROJECT }}" -name "build.gradle" | while read f; do
            echo "Patching $f..."
            cat_file $f
            sed -i "s|ndkPath \"[^\"]*\"|ndkPath \"$NDK_PATH\"|g" "$f"
            echo "Patched $f."
            cat_file $f
          done
          #
          # Убираем ndkVersion - пусть берёт из найденного NDK
          find "${{ env.GRADLE_PROJECT }}" -name "build.gradle" | while read f; do
            echo "Убираем ndkVersion из $f..."
            cat_file $f
            sed -i '/ndkVersion/d' "$f"
            echo "Patched $f."
            cat_file $f
          done
          #
          # Удаляем ненужные для анализа скрипты символов
          sed -i '/apply from.*setupSymbols/d'     "${{ env.GRADLE_PROJECT }}/launcher/build.gradle"
          sed -i '/apply from.*keepUnitySymbols/d' "${{ env.GRADLE_PROJECT }}/launcher/build.gradle"
          #
          echo "=== local.properties ==="
          cat_file "${{ env.GRADLE_PROJECT }}/local.properties"
          echo "=== build.gradle ==="
          cat_file "${{ env.GRADLE_PROJECT }}/launcher/build.gradle"
          echo "=== ndkPath line ==="
          grep -rn "ndkPath" "${{ env.GRADLE_PROJECT }}" --include="*.gradle" || true
          echo "====================================================="
          echo "=== ndkVersion line ==="
          grep -rn "ndkVersion" "${{ env.GRADLE_PROJECT }}" --include="*.gradle" || true
          echo "====================================================="
          echo "=== apply from lines ===" 
          grep -n "apply from" "${{ env.GRADLE_PROJECT }}/launcher/build.gradle" || true
          echo "====================================================="
          #
          #grep -n  "ndkVersion" "${{ env.GRADLE_PROJECT }}/shared/common.gradle" || true
          #grep -n  "ndkPath"    "${{ env.GRADLE_PROJECT }}/shared/common.gradle" || true
          #grep -rn "ndkVersion" "${{ env.GRADLE_PROJECT }}" 2>/dev/null || true  # без --include, все файлы
          #grep -rn "ndkPath"    "${{ env.GRADLE_PROJECT }}" 2>/dev/null || true  # без --include, все файлы
          #echo "====================================================="
          #
          # Заменяем Docker-путь на реальный путь хост-раннера
          sed -i "s|/github/workspace|${{ github.workspace }}|g" "${{ env.GRADLE_PROJECT }}/settings.gradle"
          #
          echo "=== settings.gradle maven repos ==="
          grep -A2 "maven" "${{ env.GRADLE_PROJECT }}/settings.gradle"
          #echo "====================================================="

      - name: Run R8 Configuration Analyzer
        continue-on-error: true
        id: run_R8_configuration_analyzer
        if: always() && steps.fix_sdk_ndk_paths_for_R8.outcome == 'success'
        run: |
          GRADLE_OPTS="-Dcom.android.tools.r8.dumpkeepradiushtmltodirectory=${{ github.workspace }}/r8analysis"
          echo "=== GRADLE_OPTS ==="
          echo "$GRADLE_OPTS"
          echo "====================================================="
          #
          cd ${{ env.GRADLE_PROJECT }}
          time ${{ env.GRADLE_BIN }} :launcher:analyzeReleaseR8Config --no-daemon

      - name: Post 'R8 Configuration Analyzer' info
        timeout-minutes: 1
        continue-on-error: true
        if: always()
        run: |
          echo "##### 'R8 Configuration Analyzer' Step Info" >> $GITHUB_STEP_SUMMARY
          echo "- Setup latest Gradle: \`${{ steps.setup_latest_Gradle.outcome }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Patch Gradle project for R8 Configuration Analyzer: \`${{ steps.patch_gradle_project_for_R8.outcome }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Fix SDK/NDK paths for R8 analyzer: \`${{ steps.fix_sdk_ndk_paths_for_R8.outcome }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Run R8 Configuration Analyzer: \`${{ steps.run_R8_configuration_analyzer.outcome }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload R8 Configuration Analyzer Report
        continue-on-error: true
        timeout-minutes: 1
        if: always() && steps.run_R8_configuration_analyzer.outcome != 'skipped'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          REPORTS_DIR="Library/Bee/Android/Prj/IL2CPP/Gradle/launcher/build/reports/"
          if [ -d "$REPORTS_DIR" ]; then
            source .github/scripts/helpers.sh
            #
            archive_name="${{ env.VERSIONnMODE }}.R8_Configuration_Analyzer_Report.7z"
            compress_7z "$REPORTS_DIR/" "$archive_name" 9
            time aws s3 cp "$archive_name" "s3://$R2_BUCKET/${{ env.VERSIONnMODE }}/$archive_name" --endpoint-url $R2_ENDPOINT --quiet
            #
            zst_file_name="${{ env.VERSIONnMODE }}.R8_Configuration_Analyzer_Report.tar.zst"
            compress_zstd "$REPORTS_DIR/" "$zst_file_name" 19
            time aws s3 cp "$zst_file_name" "s3://$R2_BUCKET/${{ env.VERSIONnMODE }}/$zst_file_name" --endpoint-url $R2_ENDPOINT --quiet
          else
            echo "'$REPORTS_DIR' folder not found, skipping uploading it to R2."
          fi

      - name: Find R8 output
        continue-on-error: true
        if: always() && steps.run_R8_configuration_analyzer.outcome != 'skipped'
        run: |
          find ${{ github.workspace }}/r8analysis -type f 2>/dev/null || echo "r8analysis пуст"
          find ${{ env.GRADLE_PROJECT }} -name "*keepradius*" -o -name "*.pb" 2>/dev/null || true

      - name: Upload R8 Configuration Analysis
        continue-on-error: true
        timeout-minutes: 1
        if: always() && steps.run_R8_configuration_analyzer.outcome != 'skipped'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          REPORTS_DIR="${{ github.workspace }}/r8analysis/"
          if [ -d "$REPORTS_DIR" ]; then
            source .github/scripts/helpers.sh
            #
            archive_name="${{ env.VERSIONnMODE }}.r8-configuration-analysis_asd1.7z"
            compress_7z "$REPORTS_DIR/" "$archive_name" 9
            time aws s3 cp "$archive_name" "s3://$R2_BUCKET/${{ env.VERSIONnMODE }}/$archive_name" --endpoint-url $R2_ENDPOINT --quiet
            #
            zst_file_name="${{ env.VERSIONnMODE }}.r8-configuration-analysis_asd1.tar.zst"
            compress_zstd "$REPORTS_DIR/" "$zst_file_name" 19
            time aws s3 cp "$zst_file_name" "s3://$R2_BUCKET/${{ env.VERSIONnMODE }}/$zst_file_name" --endpoint-url $R2_ENDPOINT --quiet
          else
            echo "'$REPORTS_DIR' folder not found, skipping uploading it to R2."
          fi

      - name: Upload R8 Configuration Analysis
        continue-on-error: true
        timeout-minutes: 1
        if: always() && steps.run_R8_configuration_analyzer.outcome != 'skipped'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          REPORTS_DIR="/home/runner/work/Card-Game-Simulator/Card-Game-Simulator/r8analysis/"
          if [ -d "$REPORTS_DIR" ]; then
            source .github/scripts/helpers.sh
            #
            archive_name="${{ env.VERSIONnMODE }}.r8-configuration-analysis_asd2.7z"
            compress_7z "$REPORTS_DIR/" "$archive_name" 9
            time aws s3 cp "$archive_name" "s3://$R2_BUCKET/${{ env.VERSIONnMODE }}/$archive_name" --endpoint-url $R2_ENDPOINT --quiet
            #
            zst_file_name="${{ env.VERSIONnMODE }}.r8-configuration-analysis_asd2.tar.zst"
            compress_zstd "$REPORTS_DIR/" "$zst_file_name" 19
            time aws s3 cp "$zst_file_name" "s3://$R2_BUCKET/${{ env.VERSIONnMODE }}/$zst_file_name" --endpoint-url $R2_ENDPOINT --quiet
          else
            echo "'$REPORTS_DIR' folder not found, skipping uploading it to R2."
          fi

      - name: Check /github/workspace/r8analysis
        continue-on-error: true
        timeout-minutes: 1
        if: always() && steps.run_R8_configuration_analyzer.outcome != 'skipped'
        run: |
          source .github/scripts/helpers.sh
          check_folder ${{ github.workspace }}/r8analysis
          check_folder /tmp/r8analysis

      - name: Upload pb files as artifact
        continue-on-error: true
        timeout-minutes: 10
        if: always() && steps.run_R8_configuration_analyzer.outcome != 'skipped'
        run: |
          find / \( -path /proc -o -path /sys \) -prune -o -type f \( -iname "*.pb" \) | zip pb-files2.zip -@

      - name: Upload pb
        continue-on-error: true
        timeout-minutes: 1
        if: always() && steps.run_R8_configuration_analyzer.outcome != 'skipped'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: pb-files2
          path: pb-files2.zip
          retention-days: 1

      - name: Upload R8 Configuration Analyzer Report
        continue-on-error: true
        timeout-minutes: 1

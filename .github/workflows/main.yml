      - name: Upload Gradle Problems Report (main build)
        continue-on-error: true
        timeout-minutes: 1
        if: always() && steps.buildStep.outcome != 'skipped'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          REPORTS_DIR="Library/Bee/Android/Prj/IL2CPP/Gradle/launcher/build/reports/"
          if [ -d "$REPORTS_DIR" ]; then
            source .github/scripts/helpers.sh
            #
            archive_name="${{ env.VERSIONnMODE }}.Gradle_Problems_Report-main_build.7z"
            compress_7z "$REPORTS_DIR/" "$archive_name" 9
            time aws s3 cp "$archive_name" "s3://$R2_BUCKET/${{ env.VERSIONnMODE }}/$archive_name" --endpoint-url $R2_ENDPOINT --quiet
            #
            zst_file_name="${{ env.VERSIONnMODE }}.Gradle_Problems_Report-main_build.tar.zst"
            compress_zstd "$REPORTS_DIR/" "$zst_file_name" 19
            time aws s3 cp "$zst_file_name" "s3://$R2_BUCKET/${{ env.VERSIONnMODE }}/$zst_file_name" --endpoint-url $R2_ENDPOINT --quiet
          else
            echo "'$REPORTS_DIR' folder not found, skipping uploading it to R2."
          fi

      - name: Revert `ProjectSettings/ProjectSettings.asset`
        timeout-minutes: 1
        if: steps.buildStep.outcome == 'success'
        run: |
          DEST="ProjectSettings/ProjectSettings.asset"
          rm "$DEST"
          mv "$DEST.bak" "$DEST"

      #- name: Find r8analysis

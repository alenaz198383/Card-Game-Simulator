name: Build with GameCI

permissions:
  actions: write # To cancel runs (gh run cancel) and delete the cache
  checks: write
  contents: read # To read the code
  pull-requests: read # To check for PR (gh pr list)

concurrency: unity
env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      use_cached_library:
        description: 'Use cached Library'
        type: boolean
        default: true
      custom_build_version:
        description: 'Версия сборки (формат 1.2.3). Оставьте пустым, чтобы взять из buildVersion.txt'
        required: false
        type: string
        default: ''
      # Main job
      run_tests:
        description: 'Run Tests'
        type: boolean
        default: false
      # build jobs
      run_build_jobs:
        description: 'Run Build Jobs'
        type: boolean
        default: true
      run_buildAndroid_job:
        description: 'Job: Android Build'
        type: boolean
        default: true
      android_export_types:
        description: 'Android Export Types'
        type: choice
        options:
          - both
          - apk
          - aab
        default: aab
      sentry_debug:
        description: 'Sentry CLI debug logging'
        type: boolean
        default: false
      run_buildWindows_job:
        description: 'Job: Windows Build'
        type: boolean
        default: false

jobs:
  check_secrets:
    name: 🔑🩺 Check GitHub Secrets
    timeout-minutes: 3
    if: |
      !contains(fromJSON('["dependabot", "renovate"]'), github.actor) &&
      !startsWith(github.event.pull_request.title, 'chore(deps') &&
      !startsWith(github.event.pull_request.title, 'fix(deps')
    runs-on: ubuntu-latest
    # runs-on: self-hosted
    steps:
      - name: 🔑 Check Unity license
        timeout-minutes: 1
        id: checklicense
        env:
          UNITY_SERIAL_PERSONAL: ${{ secrets.UNITY_SERIAL_PERSONAL }}
          UNITY_EMAIL_PERSONAL: ${{ secrets.UNITY_EMAIL_PERSONAL }}
          UNITY_PASSWORD_PERSONAL: ${{ secrets.UNITY_PASSWORD_PERSONAL }}
        run: |
          missing_secrets=""
          [ -z "$UNITY_SERIAL_PERSONAL" ] && missing_secrets="$missing_secrets UNITY_SERIAL_PERSONAL"
          [ -z "$UNITY_EMAIL_PERSONAL" ] && missing_secrets="$missing_secrets UNITY_EMAIL_PERSONAL"
          [ -z "$UNITY_PASSWORD_PERSONAL" ] && missing_secrets="$missing_secrets UNITY_PASSWORD_PERSONAL"
          if [ -z "$missing_secrets" ]; then
            echo "✅ All required 'UNITY_' secrets are present"
          else
            echo "❌ Missing 'UNITY_' secrets:$missing_secrets"
            exit 1
          fi

      - name: 🩺 Check 'ANDROID_' secrets
        timeout-minutes: 1
        id: check_android_secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEYALIAS_PASS: ${{ secrets.ANDROID_KEYALIAS_PASS }}
        run: |
          missing_secrets=""
          [ -z "$ANDROID_KEYSTORE_BASE64" ] && missing_secrets="$missing_secrets ANDROID_KEYSTORE_BASE64"
          [ -z "$ANDROID_KEYSTORE_PASS" ] && missing_secrets="$missing_secrets ANDROID_KEYSTORE_PASS"
          [ -z "$ANDROID_KEYALIAS_PASS" ] && missing_secrets="$missing_secrets ANDROID_KEYALIAS_PASS"
          if [ -z "$missing_secrets" ]; then
            echo "✅ All required 'ANDROID_' secrets are present"
          else
            echo "❌ Missing 'ANDROID_' secrets:$missing_secrets"
            exit 1
          fi

  tests:
    name: Unit Tests
    needs: [check_secrets]
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_tests)
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: write
    timeout-minutes: 30
    steps:
      - name: Free Disk Space
        timeout-minutes: 5
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          large-packages: false

      - name: Checkout Repository
        timeout-minutes: 2
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Restore cache from R2
        timeout-minutes: 1
        id: restore_cache_r2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          cd ..
          rm -rf Card-Game-Simulator/
          mkdir -p Card-Game-Simulator/
          if aws s3 cp "s3://$R2_BUCKET/cache.zip" cache.zip --endpoint-url $R2_ENDPOINT --quiet; then
            echo "Cache found, extracting..."
            unzip -q cache.zip -d ./Card-Game-Simulator/ && rm cache.zip && cd ./Card-Game-Simulator/
          else
            echo "Cache not found. Nothing to download - stop the job."
            exit 1
          fi

      - name: Cache Library
        timeout-minutes: 3
        uses: actions/cache@v6.1.0
        with:
          path: Library
          key: Library-test-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectSettings.asset', 'ProjectSettings/ProjectVersion.txt') }}

      - name: Run EditMode Tests
        timeout-minutes: 20
        uses: game-ci/unity-test-runner@v4.3.1
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL_PERSONAL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD_PERSONAL }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL_PERSONAL }}
        with:
          testMode: editmode

      #- name: Run PlayMode Tests
      # timeout-minutes: 20
      #  uses: game-ci/unity-test-runner@v4.3.1
      #  env:
      #    UNITY_EMAIL: ${{ secrets.UNITY_EMAIL_PERSONAL }}
      #    UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD_PERSONAL }}
      #    UNITY_SERIAL: ${{ secrets.UNITY_SERIAL_PERSONAL }}
      #  with:
      #    testMode: playmode
      #    githubToken: ${{ secrets.GITHUB_TOKEN }}

  buildAndroid:
    name: 🦺 Build for Android (${{ matrix.exportMode }})
    runs-on: ubuntu-latest
    # needs: [tests, lint]
    needs: [check_secrets]
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_buildAndroid_job && inputs.run_build_jobs)
    strategy:
      fail-fast: false
      matrix:
        exportMode: ${{ (github.event_name == 'workflow_dispatch' && inputs.android_export_types == 'apk' && fromJSON('["apk"]')) || (github.event_name == 'workflow_dispatch' && inputs.android_export_types == 'aab' && fromJSON('["aab"]')) || fromJSON('["apk", "aab"]') }}
    outputs:
      buildVersion: ${{ steps.buildStep.outputs.buildVersion }}
    timeout-minutes: 90
    steps:
      - name: Free Disk Space
        timeout-minutes: 5
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true

      - name: Checkout Repository
        timeout-minutes: 2
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Restore cache from R2
        timeout-minutes: 1
        id: restore_cache_r2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          SENTRY_CLI_OPTIONS: ${{ secrets.SENTRY_CLI_OPTIONS }}
        run: |
          cd ..
          if aws s3 cp "s3://$R2_BUCKET/cache.zip" cache.zip --endpoint-url $R2_ENDPOINT --quiet; then
            echo "Cache found, extracting..."
            unzip -q cache.zip -d ./Card-Game-Simulator_new/ && rm cache.zip
          else
            echo "Cache not found. Nothing to download - stop the job."
            exit 1
          fi
          rm -rf Card-Game-Simulator/
          mv Card-Game-Simulator_new/ Card-Game-Simulator/
          cd ./Card-Game-Simulator/
          mkdir -p Assets/Plugins/Sentry/
          echo "$SENTRY_CLI_OPTIONS" > Assets/Plugins/Sentry/SentryCliOptions.asset

      #- name: Restore Library cache from R2
      # timeout-minutes: 1
      #  id: restore_library_cache
      #  env:
      #    AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      #    AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      #    AWS_DEFAULT_REGION: us-east-1
      #    R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
      #    R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      #    CACHE_KEY: Library-Android-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectSettings.asset', 'ProjectSettings/ProjectVersion.txt', 'Assets/Settings/Build Profiles/Android_Release_APK.asset', 'Assets/Settings/Build Profiles/Android_Release_AAB.asset') }}
      #  run: |
      #    echo "Looking for cache: $CACHE_KEY"
      #    if aws s3 cp "s3://$R2_BUCKET/$CACHE_KEY" Library.tar.zst --endpoint-url $R2_ENDPOINT --quiet; then
      #      echo "Cache found, extracting..."
      #      tar -I zstd -xf Library.tar.zst
      #      rm Library.tar.zst
      #      source .github/scripts/helpers.sh
      #      check_folder ./
      #      check_folder "Library/"
      #      rm -rf Library/
      #    else
      #      echo "Cache not found. Nothing to download."
      #    fi

      - name: Cache Library
        timeout-minutes: 3
        uses: actions/cache@v6.1.0
        if: github.event_name != 'workflow_dispatch' || inputs.use_cached_library == true
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectSettings.asset', 'ProjectSettings/ProjectVersion.txt', 'Assets/Settings/Build Profiles/Android_Release_APK.asset', 'Assets/Settings/Build Profiles/Android_Release_AAB.asset') }}-${{ matrix.exportMode == 'apk' && 'apk' || 'aab' }}
          restore-keys: |
            Library-Android-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectSettings.asset', 'ProjectSettings/ProjectVersion.txt', 'Assets/Settings/Build Profiles/Android_Release_APK.asset', 'Assets/Settings/Build Profiles/Android_Release_AAB.asset') }}-

      - name: Extract Build Versions (File or Input)
        timeout-minutes: 1
        run: |
          CUSTOM_VER="${{ inputs.custom_build_version }}"
          #
          # --- Логика для VERSION (buildVersion.txt) ---
          if [ -n "$CUSTOM_VER" ]; then
            echo "Using custom build version from input: $CUSTOM_VER"
            BUILD_VERSION="$CUSTOM_VER"
            #
            # 2. Валидация формата X.Y.Z (три числа через точку)
            # Регулярка проверяет: начало строки, число, точка, число, точка, число, конец строки
            if ! [[ "$BUILD_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Error: Invalid version format '$BUILD_VERSION'. Expected format is X.Y.Z (e.g., 1.2.3)" >&2
              exit 1
            fi
            #
            # 3. Парсим X, Y, Z
            # Используем IFS (Internal Field Separator) для разбиения строки по точке
            IFS='.' read -r X Y Z <<< "$BUILD_VERSION"
            #
            # На всякий случай проверяем, что переменные не пустые (защита от странных багов)
            if [ -z "$X" ] || [ -z "$Y" ] || [ -z "$Z" ]; then
              echo "Error: Failed to parse version components from '$BUILD_VERSION'" >&2
              echo "major: $X"
              echo "minor: $Y"
              echo "patch: $Z"
              exit 1
            fi
            #
            # 4. Вычисляем ANDROID_VERSION_CODE
            ANDROID_CODE=$((X * 1000000 + Y * 1000 + Z))
            #
            echo "Parsed components: X=$X, Y=$Y, Z=$Z"
            echo "Calculated ANDROID_VERSION_CODE: $ANDROID_CODE"
          else
            ANDROID_CODE=$(cat ProjectSettings/androidVersionCode.txt | tr -d '[:space:]')
            BUILD_VERSION=$(cat ProjectSettings/buildVersion.txt | tr -d '[:space:]')
          fi
          #
          DEST="ProjectSettings/ProjectSettings.asset"
          cp "$DEST" "$DEST.bak"
          #
          sed -i "s/^  bundleVersion: .*/  bundleVersion: $BUILD_VERSION/" "$DEST"
          sed -i "s/^  AndroidBundleVersionCode: .*/  AndroidBundleVersionCode: $ANDROID_CODE/" "$DEST"
          #
          PROJECT_BUILD_VERSION=$(grep -oP 'bundleVersion:\s*\K[\d.]+' ProjectSettings/ProjectSettings.asset)
          PROJECT_ANDROID_CODE=$(grep -oP 'AndroidBundleVersionCode:\s*\K\d+' ProjectSettings/ProjectSettings.asset)
          #
          echo "VERSION=$PROJECT_BUILD_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=$PROJECT_ANDROID_CODE" >> "$GITHUB_ENV"

      - name: Show Final Using Versions
        timeout-minutes: 1
        run: |
          echo "Final using VERSION: ${{ env.VERSION }}"
          echo "Final using ANDROID_VERSION_CODE: ${{ env.ANDROID_VERSION_CODE }}"

      - name: 📈 Install sentry-cli
        timeout-minutes: 1
        if: matrix.exportMode == 'aab'
        run: |
          curl -sL https://sentry.io/get-cli/ | bash

      - name: Before build timestamp
        timeout-minutes: 1
        if: ${{ always() }}
        run: |
          date -u
          df -h
          free -h || true

      - name: 🦺 Build Android ${{ matrix.exportMode }}
        timeout-minutes: 90
        id: buildStep
        uses: game-ci/unity-builder@v5.0.0
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL_PERSONAL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD_PERSONAL }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL_PERSONAL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          targetPlatform: Android
          customParameters: -SENTRY_AUTH_TOKEN ${{ secrets.SENTRY_AUTH_TOKEN }} -SENTRY_ORG ${{ secrets.SENTRY_ORG }} -SENTRY_PROJECT ${{ secrets.SENTRY_PROJECT }}
          allowDirtyBuild: true
          versioning: Custom
          version: ${{ env.VERSION }}
          androidVersionCode: ${{ env.ANDROID_VERSION_CODE }}
          buildProfile: ${{ matrix.exportMode == 'apk' && 'Assets/Settings/Build Profiles/Android_Release_APK.asset' || 'Assets/Settings/Build Profiles/Android_Release_AAB.asset' }}
          androidExportType: ${{ matrix.exportMode == 'apk' && 'androidPackage' || 'androidAppBundle' }}
          androidKeystoreName: 'my-release-key.jks'
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: my-key-alias
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          androidTargetSdkVersion: AndroidApiLevel36

      - name: After build timestamp
        timeout-minutes: 1
        if: ${{ always() }}
        run: |
          date -u
          df -h
          free -h || true

      - name: Revert `ProjectSettings/ProjectSettings.asset`
        timeout-minutes: 1
        continue-on-error: true
        if: steps.buildStep.outcome == 'success'
        run: |
          DEST="ProjectSettings/ProjectSettings.asset"
          rm "$DEST"
          mv "$DEST.bak" "$DEST"

      #- name: Upload Build as GitHub artifact
      # timeout-minutes: 10
      #  uses: actions/upload-artifact@v7.0.1
      #  if: steps.buildStep.outcome != 'skipped'
      #  with:
      #    path: build/Android
      #    name: cgs-Android-${{ matrix.exportMode }}-${{ env.ANDROID_VERSION_CODE }}
      #    retention-days: 1

      - name: Upload Build to R2
        timeout-minutes: 1
        continue-on-error: true
        if: steps.buildStep.outcome != 'skipped'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          if [ -d "build/Android" ]; then
            source .github/scripts/helpers.sh
            DIR="artifacts/build/Android"
            SRC="${DIR}/Android.${{ matrix.exportMode }}"
            DEST="${DIR}/${{ env.ANDROID_VERSION_CODE }}.${{ matrix.exportMode }}"
            check_folder "artifacts/"
            mkdir -p artifacts
            check_folder "artifacts/"
            check_folder "build/"
            check_folder "build/Android/"
            check_file   "build/Android/Android.aab"
            cp -r "build/" "artifacts/"
            check_folder "artifacts/"
            check_folder "artifacts/build/"
            check_folder "artifacts/build/Android/"
            check_file   "$SRC"
            check_file   "$DEST"
            mv "$SRC" "$DEST"
            check_file   "$SRC"
            check_file   "$DEST"
            zst_file_name="${{ env.ANDROID_VERSION_CODE }}.${{ matrix.exportMode }}.tar.zst"
            tar -I 'zstd -9' -cf "artifacts/$zst_file_name" "$DIR/"
            aws s3 cp "artifacts/$zst_file_name" "s3://$R2_BUCKET/$zst_file_name" --endpoint-url $R2_ENDPOINT --quiet
            rm -rf artifacts/
          else
            echo "'build/Android' folder not found, skipping '${{ matrix.exportMode }}' save."
          fi

      - name: 📈 Upload AAB to Sentry for Size Tracking
        timeout-minutes: 1
        continue-on-error: true
        if: steps.buildStep.outcome == 'success' && matrix.exportMode == 'aab'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          AAB_FILE=$(find build -name "*.aab" | head -n 1)
          if [ -n "$AAB_FILE" ]; then
            echo "All '*.aab' files found:"
            find build -name "*.aab"
            echo "Using: $AAB_FILE"
            RELEASE_NAME="game2048@${{ env.VERSION }}"
            #
            echo ""; echo "----- Creating Sentry release ($RELEASE_NAME) executed... -----"
            sentry-cli releases new "$RELEASE_NAME" \
              --org "$SENTRY_ORG" \
              --project "$SENTRY_PROJECT" \
              #--finalize \
              ${{ inputs.sentry_debug == true && '--log-level debug' || '' }}
            echo "----- Creating Sentry release ($RELEASE_NAME) completed -----"; echo ""
            #
            echo ""; echo "----- Uploading AAB to Sentry executed... -----"
            sentry-cli build upload "$AAB_FILE" \
              --org "$SENTRY_ORG" \
              --project "$SENTRY_PROJECT" \
              --build-configuration Release \
              --head-sha "${{ github.sha }}" \
              --head-repo-name "gal20040/2048" \
              --vcs-provider github \
              --force-git-metadata \
              ${{ inputs.sentry_debug == true && '--log-level debug' || '' }}
            echo "----- Uploading AAB to Sentry completed -----"; echo ""
          else
            echo "AAB file not found."
            exit 1
          fi

      - name: 📈 Upload '*mapping*' to Sentry
        timeout-minutes: 1
        continue-on-error: true
        if: steps.buildStep.outcome == 'success' && matrix.exportMode == 'aab'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          AAB_FILE=$(find build -name "*.aab" | head -n 1)
          if [ -n "$AAB_FILE" ]; then
            echo "All '*mapping*' files found:"
            find build -name "*mapping*"
            # Upload R8/ProGuard mapping if it exists
            MAPPING_FILE=$(find build -name "*mapping*" | head -n 1)
            if [ -n "$MAPPING_FILE" ]; then
              echo ""; echo "----- Uploading mapping to Sentry executed... -----"
              find build -name "*mapping*" | xargs sentry-cli upload-proguard \
                --org "$SENTRY_ORG" \
                --project "$SENTRY_PROJECT" \
                ${{ inputs.sentry_debug == true && '--log-level debug' || '' }}
              echo "----- Uploading mapping to Sentry completed -----"; echo ""
            else
              echo "No '*mapping*' found (minification may be disabled)"
            fi
          else
            echo "AAB file not found."
            exit 1
          fi

      - name: 📈 Upload symbol's files to Sentry
        timeout-minutes: 1
        continue-on-error: true
        if: steps.buildStep.outcome == 'success' && matrix.exportMode == 'aab'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          AAB_FILE=$(find build -name "*.aab" | head -n 1)
          if [ -n "$AAB_FILE" ]; then
            echo ""; echo "----- Uploading symbol's files to Sentry executed... -----"
            sentry-cli debug-files upload \
              --org "$SENTRY_ORG" \
              --project "$SENTRY_PROJECT" \
              --il2cpp-mapping \
              build/ \
              ${{ inputs.sentry_debug == true && '--log-level debug' || '' }}
            echo "----- Uploading symbol's files to Sentry completed -----"; echo ""
          else
            echo "AAB file not found."
            exit 1
          fi

      - name: 📈 Upload symbol's files to Sentry
        timeout-minutes: 2
        continue-on-error: true
        if: steps.buildStep.outcome == 'success' && matrix.exportMode == 'aab'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          AAB_FILE=$(find build -name "*.aab" | head -n 1)
          if [ -n "$AAB_FILE" ]; then
            echo ""; echo "----- Uploading symbol's files to Sentry executed... -----"
            sentry-cli debug-files upload \
              --org "$SENTRY_ORG" \
              --project "$SENTRY_PROJECT" \
              --il2cpp-mapping \
              ./ \
              ${{ inputs.sentry_debug == true && '--log-level debug' || '' }}
            echo "----- Uploading symbol's files to Sentry completed -----"; echo ""
          else
            echo "AAB file not found."
            exit 1
          fi

      - name: Post android build info
        timeout-minutes: 1
        if: always()
        run: |
          echo "##### Build Step Info" >> $GITHUB_STEP_SUMMARY
          echo "- Project Version (buildVersion): \`${{ steps.buildStep.outputs.buildVersion }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Android Version Code: \`${{ steps.buildStep.outputs.androidVersionCode }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Build Step Exit Code: \`${{ steps.buildStep.outputs.engineExitCode }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Build Step outcome: \`${{ steps.buildStep.outcome }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Build Step conclusion: \`${{ steps.buildStep.conclusion }}\`" >> $GITHUB_STEP_SUMMARY

      #- name: Save Library cache to R2
      # timeout-minutes: 10
      #  id: save_library_cache
      #  if: steps.buildStep.outcome == 'success'
      #  env:
      #    AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      #    AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      #    AWS_DEFAULT_REGION: us-east-1
      #    R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
      #    R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      #    CACHE_KEY: Library-Android-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectSettings.asset', 'ProjectSettings/ProjectVersion.txt', 'Assets/Settings/Build Profiles/Android_Release_APK.asset', 'Assets/Settings/Build Profiles/Android_Release_AAB.asset') }}
      #  run: |
      #    if [ -d "Library" ]; then
      #      echo "Saving cache: $CACHE_KEY"
      #      tar -I 'zstd -9' -cf Library.tar.zst Library
      #      aws s3 cp Library.tar.zst "s3://$R2_BUCKET/$CACHE_KEY" --endpoint-url $R2_ENDPOINT --quiet
      #      echo "Cache saved successfully."
      #      source .github/scripts/helpers.sh
